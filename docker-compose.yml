# Docker Compose for Partner API + Nginx
#
# Postgres is INTENTIONALLY not part of this stack — partner-api shares
# the same database as xmeta-admin-api (managed by that service). Set
# DB_HOST in .env to the admin server's postgres (private VPC IP for
# intra-VPC, public IP if the two boxes are not in the same VPC).
#
# Frontend (xmeta-partner-web) is deployed separately on Vercel.

services:
  # ==========================================
  # Go Backend API
  # ==========================================
  backend:
    image: ${DOCKER_IMAGE:-xmeta-partner-api-local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xmeta_partner_backend
    restart: always
    expose:
      - "8080"
    environment:
      # App
      APP_PORT: 8080
      GIN_MODE: release
      # Database — points at the shared admin postgres via DB_HOST in .env
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_TIMEZONE: Asia/Ulaanbaatar
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-false}
      DB_RUN_MIGRATIONS: ${DB_RUN_MIGRATIONS:-false}
      # AWS Cognito (admin pool — used by /admin/partner/* endpoints)
      # AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY are intentionally left
      # empty: on EC2 we attach an IAM Instance Profile and the SDK falls
      # through to the default credential chain (IMDS).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION}
      COGNITO_USER_POOL_ID: ${COGNITO_USER_POOL_ID}
      COGNITO_CLIENT_ID: ${COGNITO_CLIENT_ID}
      # AWS Cognito (partner pool — used by /partner/* endpoints)
      PARTNER_COGNITO_USER_POOL_ID: ${PARTNER_COGNITO_USER_POOL_ID}
      PARTNER_COGNITO_CLIENT_ID: ${PARTNER_COGNITO_CLIENT_ID}
      # Internal API key (xmeta-monorepo → partner-api events)
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      # CORS — partner-portal + admin-portal origins
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    networks:
      - partner_network

  # ==========================================
  # Nginx Gateway (HTTP/HTTPS termination)
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: xmeta_partner_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/certbot:/var/www/certbot:ro
    depends_on:
      - backend
    networks:
      - partner_network

networks:
  partner_network:
    driver: bridge
