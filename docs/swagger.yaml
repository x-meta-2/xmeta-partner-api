basePath: /api/v1
definitions:
  database.AdminGroup:
    properties:
      createdAt:
        type: string
      id:
        type: string
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/database.AdminPermission'
        type: array
      updatedAt:
        type: string
    type: object
  database.AdminPermission:
    properties:
      createdAt:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updatedAt:
        type: string
    type: object
  database.AdminUser:
    properties:
      adminGroup:
        $ref: '#/definitions/database.AdminGroup'
      adminGroupId:
        type: string
      createdAt:
        type: string
      department:
        type: string
      email:
        type: string
      id:
        type: string
      isEnabled:
        type: boolean
      status:
        type: string
      updatedAt:
        type: string
    type: object
  database.ApplicationStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - ApplicationStatusPending
    - ApplicationStatusApproved
    - ApplicationStatusRejected
  database.Partner:
    properties:
      companyName:
        type: string
      createdAt:
        type: string
      id:
        type: string
      metaData:
        additionalProperties: true
        type: object
      referralCode:
        type: string
      socialMedia:
        additionalProperties: true
        description: |-
          SocialMedia mirrors PartnerApplication.SocialMedia at approve time.
          Application stays as the review snapshot; this column is the
          partner's *current* profile (Settings edits land here).

          `serializer:json` round-trips `map[string]interface{}` through
          encoding/json so the column can stay TEXT — works with both lib/pq
          and pgx. Partial `Updates(map)` bypass the serializer, so the
          service marshals the value to a JSON string before assigning.
        type: object
      status:
        $ref: '#/definitions/database.PartnerStatus'
      tier:
        $ref: '#/definitions/database.PartnerTier'
      tierId:
        type: string
      totalEarnings:
        type: number
      totalReferrals:
        type: integer
      updatedAt:
        type: string
      user:
        $ref: '#/definitions/database.User'
      userId:
        type: string
      website:
        type: string
    type: object
  database.PartnerApplication:
    properties:
      audienceSize:
        type: string
      companyName:
        type: string
      createdAt:
        type: string
      id:
        type: string
      promotionPlan:
        type: string
      rejectionReason:
        type: string
      reviewedAt:
        type: string
      reviewedBy:
        type: string
      reviewer:
        allOf:
        - $ref: '#/definitions/database.AdminUser'
        description: |-
          Reviewer mirrors ReviewedBy as the actual admin row, preloaded by
          the admin endpoints so the UI can show "approved by {email}" without
          a second round-trip. admin_users is owned by xmeta-admin-api; here
          we just JOIN through ReviewedBy.
      socialMedia:
        additionalProperties: true
        type: object
      status:
        $ref: '#/definitions/database.ApplicationStatus'
      updatedAt:
        type: string
      user:
        $ref: '#/definitions/database.User'
      userId:
        type: string
      website:
        type: string
    type: object
  database.PartnerStatus:
    enum:
    - pending
    - active
    - suspended
    type: string
    x-enum-varnames:
    - PartnerStatusPending
    - PartnerStatusActive
    - PartnerStatusSuspended
  database.PartnerTier:
    properties:
      color:
        type: string
      commissionRate:
        type: number
      createdAt:
        type: string
      id:
        type: string
      isDefault:
        type: boolean
      level:
        type: integer
      maxVolume:
        type: number
      minActiveClients:
        type: integer
      minVolume:
        type: number
      name:
        type: string
      updatedAt:
        type: string
    type: object
  database.Payout:
    properties:
      amount:
        type: number
      approvedBy:
        type: string
      commissionCount:
        type: integer
      createdAt:
        type: string
      currency:
        type: string
      failureReason:
        type: string
      id:
        type: string
      partner:
        $ref: '#/definitions/database.Partner'
      partnerId:
        type: string
      periodEnd:
        type: string
      periodStart:
        type: string
      processedAt:
        type: string
      status:
        $ref: '#/definitions/database.PayoutStatus'
      transactionId:
        type: string
      updatedAt:
        type: string
    type: object
  database.PayoutStatus:
    enum:
    - pending
    - processing
    - completed
    - failed
    type: string
    x-enum-varnames:
    - PayoutStatusPending
    - PayoutStatusProcessing
    - PayoutStatusCompleted
    - PayoutStatusFailed
  database.ReferralLink:
    properties:
      clicks:
        type: integer
      code:
        type: string
      createdAt:
        type: string
      id:
        type: string
      isActive:
        type: boolean
      partner:
        $ref: '#/definitions/database.Partner'
      partnerId:
        type: string
      registrations:
        type: integer
      updatedAt:
        type: string
      url:
        type: string
    type: object
  database.ReferralStatus:
    enum:
    - registered
    - deposited
    - active
    - inactive
    - unlinked
    type: string
    x-enum-varnames:
    - ReferralStatusRegistered
    - ReferralStatusDeposited
    - ReferralStatusActive
    - ReferralStatusInactive
    - ReferralStatusUnlinked
  database.User:
    properties:
      binanceEmail:
        type: string
      canTrade:
        type: boolean
      canWithdraw:
        type: boolean
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: string
      isWhitelistEnabled:
        type: boolean
      kycLevel:
        type: integer
      lastName:
        type: string
      metaData:
        additionalProperties: true
        type: object
      status:
        type: integer
      subAccountId:
        type: string
      updatedAt:
        type: string
      vipLevel:
        type: integer
    type: object
  partner.ReferralLinkLookup:
    properties:
      code:
        type: string
      isActive:
        type: boolean
      partnerEmail:
        type: string
      partnerFullName:
        type: string
      partnerId:
        type: string
    type: object
  partner.ReferralListItem:
    properties:
      createdAt:
        type: string
      endedAt:
        type: string
      firstDepositAt:
        type: string
      firstTradeAt:
        type: string
      id:
        type: string
      partnerId:
        type: string
      referralLinkId:
        type: string
      referredUser:
        $ref: '#/definitions/partner.ReferralUserRef'
      referredUserId:
        type: string
      registeredAt:
        type: string
      startedAt:
        type: string
      status:
        $ref: '#/definitions/database.ReferralStatus'
    type: object
  partner.ReferralUserRef:
    properties:
      firstName:
        type: string
      id:
        type: string
      kycLevel:
        type: integer
      lastInitial:
        type: string
      maskedEmail:
        type: string
    type: object
  structs.AdminReferralListParams:
    properties:
      current:
        type: integer
      export:
        type: boolean
      includeHistorical:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      partnerId:
        type: string
      query:
        type: string
      sortDate:
        $ref: '#/definitions/structs.SortDate'
      status:
        type: string
    type: object
  structs.ApplicationListParams:
    properties:
      current:
        type: integer
      export:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      query:
        type: string
      sortDate:
        $ref: '#/definitions/structs.SortDate'
      status:
        type: string
    type: object
  structs.ApplicationReviewParams:
    properties:
      rejectionReason:
        type: string
    type: object
  structs.ChartParams:
    properties:
      endDate:
        type: string
      groupBy:
        description: '"day", "week", "month"'
        type: string
      startDate:
        type: string
    type: object
  structs.CommissionBreakdownParams:
    properties:
      endDate:
        type: string
      startDate:
        type: string
    type: object
  structs.CommissionListParams:
    properties:
      current:
        type: integer
      export:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      referredUserId:
        type: string
      sortDate:
        $ref: '#/definitions/structs.SortDate'
      status:
        type: string
    type: object
  structs.DashboardSummaryParams:
    properties:
      endDate:
        type: string
      startDate:
        type: string
    type: object
  structs.ErrorResponse:
    properties:
      body:
        type: string
      error_msg:
        type: string
      status_code:
        type: integer
    type: object
  structs.PaginationInput:
    properties:
      current:
        type: integer
      export:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      sortDate:
        $ref: '#/definitions/structs.SortDate'
    type: object
  structs.PaginationResponse:
    properties:
      items: {}
      total:
        type: integer
    type: object
  structs.PartnerListParams:
    properties:
      current:
        type: integer
      export:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      query:
        type: string
      sortDate:
        $ref: '#/definitions/structs.SortDate'
      status:
        type: string
      tierId:
        type: string
    type: object
  structs.PartnerProfileUpdateParams:
    properties:
      companyName:
        type: string
      socialMedia:
        additionalProperties: true
        type: object
      website:
        type: string
    type: object
  structs.PartnerSignupParams:
    properties:
      audienceSize:
        type: string
      companyName:
        type: string
      promotionPlan:
        type: string
      socialMedia:
        additionalProperties: true
        type: object
      userId:
        description: |-
          UserID = Cognito sub of the applying user.
          Controller populates this from the authenticated JWT; client does not send it.
        type: string
      website:
        type: string
    type: object
  structs.PayoutListParams:
    properties:
      current:
        type: integer
      export:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      partnerId:
        type: string
      sortDate:
        $ref: '#/definitions/structs.SortDate'
      status:
        type: string
    type: object
  structs.PayoutReviewParams:
    properties:
      failureReason:
        type: string
    type: object
  structs.ReferralLinkCreateParams:
    properties:
      code:
        description: |-
          Optional partner-supplied code. 5–7 uppercase A-Z/0-9 characters.
          Empty/omitted → server auto-generates a 7-character code.
        type: string
      url:
        type: string
    type: object
  structs.ReferralListParams:
    properties:
      current:
        type: integer
      export:
        type: boolean
      limit:
        description: alias for PageSize
        type: integer
      page:
        description: alias for Current
        type: integer
      pageSize:
        type: integer
      query:
        type: string
      sortDate:
        $ref: '#/definitions/structs.SortDate'
      status:
        type: string
    type: object
  structs.ResponseBody:
    properties:
      body: {}
      message:
        type: string
    type: object
  structs.SortDate:
    properties:
      end_day:
        type: string
      start_day:
        type: string
    type: object
  structs.SuccessResponse:
    properties:
      success:
        type: boolean
    type: object
  structs.TierCreateParams:
    properties:
      color:
        type: string
      commissionRate:
        type: number
      isDefault:
        type: boolean
      level:
        type: integer
      maxVolume:
        type: number
      minActiveClients:
        type: integer
      minVolume:
        type: number
      name:
        type: string
    required:
    - commissionRate
    - level
    - name
    type: object
  structs.TierUpdateParams:
    properties:
      color:
        type: string
      commissionRate:
        type: number
      isDefault:
        type: boolean
      level:
        type: integer
      maxVolume:
        type: number
      minActiveClients:
        type: integer
      minVolume:
        type: number
      name:
        type: string
    type: object
  structs.TradeEventParams:
    properties:
      symbol:
        type: string
      tradeAmount:
        type: number
      tradeFee:
        type: number
      tradeId:
        type: string
      tradeTimestamp:
        type: integer
      userId:
        type: string
    required:
    - tradeAmount
    - tradeFee
    - tradeId
    - userId
    type: object
  structs.UnlinkReferralEventParams:
    properties:
      userId:
        type: string
    required:
    - userId
    type: object
  structs.UserDepositedParams:
    properties:
      amount:
        type: number
      userId:
        type: string
    required:
    - amount
    - userId
    type: object
  structs.UserRegisteredParams:
    properties:
      referralCode:
        type: string
      userId:
        type: string
    required:
    - referralCode
    - userId
    type: object
host: localhost:8090
info:
  contact: {}
  description: |-
    Partner program backend — public, partner, admin, system endpoints.
    Authentication is split into three layers:
    • BearerAuth (PartnerAuth/AdminAuth): Cognito ID token in `Authorization: Bearer …`.
    • InternalKey: `X-Internal-Key` header — only the xmeta-monorepo server should send this.
  title: xmeta Partner API
  version: "1.0"
paths:
  /admin/partner/analytics/commission-trend:
    post:
      consumes:
      - application/json
      description: Returns time-bucketed commission totals across all partners
      parameters:
      - description: Chart range filter
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.ChartParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/structs.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Commission trend chart
      tags:
      - Admin Analytics
  /admin/partner/analytics/referral-funnel:
    post:
      consumes:
      - application/json
      description: Returns conversion-funnel metrics from click to commissioned trade
      parameters:
      - description: Date range filter
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.DashboardSummaryParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/structs.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Referral funnel metrics
      tags:
      - Admin Analytics
  /admin/partner/analytics/summary:
    post:
      consumes:
      - application/json
      description: Returns top-level KPIs for the admin analytics dashboard
      parameters:
      - description: Date range filter
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.DashboardSummaryParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/structs.ResponseBody'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Admin analytics summary
      tags:
      - Admin Analytics
  /admin/partner/analytics/top-partners:
    post:
      consumes:
      - application/json
      description: Returns the highest-earning partners ranked by commission volume
      parameters:
      - description: Pagination input
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.PaginationInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  $ref: '#/definitions/structs.PaginationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Top partners leaderboard
      tags:
      - Admin Analytics
  /admin/partner/applications/{id}/approve:
    post:
      consumes:
      - application/json
      description: Marks an application approved and provisions the partner account
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  $ref: '#/definitions/database.PartnerApplication'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Approve partner application
      tags:
      - Admin Applications
  /admin/partner/applications/{id}/reject:
    post:
      consumes:
      - application/json
      description: Marks an application rejected with a reason
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      - description: Rejection reason
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.ApplicationReviewParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  $ref: '#/definitions/database.PartnerApplication'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reject partner application
      tags:
      - Admin Applications
  /admin/partner/applications/detail/{id}:
    get:
      consumes:
      - application/json
      description: Returns one partner application with full submission data
      parameters:
      - description: Application ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  $ref: '#/definitions/database.PartnerApplication'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get application detail
      tags:
      - Admin Applications
  /admin/partner/applications/list:
    post:
      consumes:
      - application/json
      description: Returns a paginated list of partner applications for admin review
      parameters:
      - description: Filters and pagination
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.ApplicationListParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  $ref: '#/definitions/structs.PaginationResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List partner applications
      tags:
      - Admin Applications
  /admin/partner/config/tiers:
    get:
      consumes:
      - application/json
      description: Returns all commission tiers for admin configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  items:
                    $ref: '#/definitions/database.PartnerTier'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List commission tiers (admin)
      tags:
      - Admin Config
    post:
      consumes:
      - application/json
      description: Creates a new commission tier configuration
      parameters:
      - description: Tier create payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/structs.TierCreateParams'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
                body:
                  $ref: '#/definitions/database.PartnerTier'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/structs.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create commission tier
      tags:
      - Admin Config
  /admin/partner/config/tiers/{id}:
    delete:
      consumes:
      - application/json
      description: Removes a commission tier configuration
      parameters:
      - description: Tier ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/structs.ResponseBody'
            - properties:
